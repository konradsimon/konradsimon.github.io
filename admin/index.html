<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      // Debug helper: shows whether the OAuth popup posts a message back.
      // Remove later if you want, but it's harmless.
      window.addEventListener("message", (e) => {
        try {
          if (typeof e.data === "string" && e.data.startsWith("authorization:github:")) {
            console.log("[decap-debug] oauth message received", { origin: e.origin, dataPrefix: e.data.slice(0, 40) + "…" });
            return;
          }
          console.log("[decap-debug] postMessage received", { origin: e.origin, data: e.data });
        } catch {}
      });
      window.addEventListener("error", (e) => console.log("[decap-debug] window error", e?.message || e));
      window.addEventListener("unhandledrejection", (e) =>
        console.log("[decap-debug] unhandledrejection", e?.reason || e),
      );
    </script>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  </body>
</html>
