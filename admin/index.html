<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      // Avoid fetching `config.yml` (some static hosts block .yml or return wrong MIME).
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
    <script src="./config.js"></script>
    <script>
      // `window.DECAP_CMS_CONFIG` is defined in ./config.js
      window.CMS.init({ config: window.DECAP_CMS_CONFIG });
    </script>
  </body>
</html>
